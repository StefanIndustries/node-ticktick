name: Auto Release (minor per commit)

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: auto-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Install
        run: npm ci

      - name: Bump minor version (patch=0), commit, and tag
        shell: bash
        run: |
          set -euo pipefail

          CURRENT="$(node -p "require('./package.json').version")"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          NEW_VERSION="${MAJOR}.$((MINOR + 1)).0"
          echo "Bumping version: $CURRENT -> $NEW_VERSION"

          npm pkg set version="$NEW_VERSION"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add package.json package-lock.json || true
          git commit -m "chore(release): v${NEW_VERSION} [skip ci]" || {
            echo "No changes to commit (maybe version already bumped)."
            exit 0
          }

          git tag "${NEW_VERSION}"

          git push origin HEAD:main
          git push origin "${NEW_VERSION}"

          echo "NEW_VERSION=$NEW_VERSION" >> "$GITHUB_ENV"

      - name: Build
        run: npm run build

      - name: Pack release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          # Attach compiled output + package metadata
          tar -czf "dist/node-ticktick-${NEW_VERSION}.tgz" lib package.json README.md LICENSE 2>/dev/null || true

      - name: Create GitHub Release + upload build files
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.NEW_VERSION }}
          name: v${{ env.NEW_VERSION }}
          generate_release_notes: true
          files: |
            dist/*.tgz

      - run: npm publish